<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Mattress body -->
  <rect x="4" y="14" width="40" height="20" rx="3" ry="3" fill="#2d6a4f"/>
  <!-- Top layer / pillow top -->
  <rect x="4" y="14" width="40" height="7" rx="3" ry="3" fill="#40916c"/>
  <!-- Side panel -->
  <rect x="4" y="20" width="40" height="3" fill="#1b4332"/>
  <!-- Tufting buttons -->
  <circle cx="14" cy="24" r="2" fill="#d4a017"/>
  <circle cx="24" cy="24" r="2" fill="#d4a017"/>
  <circle cx="34" cy="24" r="2" fill="#d4a017"/>
  <!-- Legs -->
  <rect x="9" y="34" width="4" height="5" rx="1" fill="#1b4332"/>
  <rect x="35" y="34" width="4" height="5" rx="1" fill="#1b4332"/>
  <!-- Pillow -->
  <rect x="8" y="9" width="18" height="8" rx="3" ry="3" fill="#74c69d"/>
  <rect x="8" y="9" width="18" height="8" rx="3" ry="3" fill="none" stroke="#40916c" stroke-width="1"/>
</svg>
